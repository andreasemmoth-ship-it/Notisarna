<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Notiserna — dina nyheter, samlat på ett ställe</title>
  <meta name="description" content="Notiserna samlar nyheter från svenska och internationella källor i ett rent, personligt flöde. Teknik, näringsliv, världen, kultur och mer — uppdaterat var 15:e minut." />

  <!-- Open Graph / Facebook / Slack / iMessage -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://notiserna.se/" />
  <meta property="og:title"       content="Notiserna — dina nyheter, samlat på ett ställe" />
  <meta property="og:description" content="Nyheter från svenska och internationella källor i ett rent, personligt flöde. Uppdateras automatiskt var 15:e minut." />
  <meta property="og:image"       content="https://notiserna.se/og-image.png" />
  <meta property="og:locale"      content="sv_SE" />
  <meta property="og:site_name"   content="Notiserna" />

  <!-- Twitter / X -->
  <meta name="twitter:card"        content="summary_large_image" />
  <meta name="twitter:title"       content="Notiserna — dina nyheter, samlat på ett ställe" />
  <meta name="twitter:description" content="Nyheter från svenska och internationella källor i ett rent, personligt flöde. Uppdateras automatiskt var 15:e minut." />
  <meta name="twitter:image"       content="https://notiserna.se/og-image.png" />

  <!-- Canonical & robots -->
  <link rel="canonical" href="https://notiserna.se/" />
  <meta name="robots" content="index, follow" />

  <!-- Structured Data for Search Engines & AI Crawlers -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Notisarna",
      "url": "https://notiserna.se/",
      "description": "Notisarna samlar nyheter från svenska och internationella källor i ett rent, personligt flöde.",
      "inLanguage": "sv"
    }
  </script>

  <!-- Förhindra blixt av fel tema vid sidladdning -->
  <script>
    (function(){
      var s = localStorage.getItem('colorScheme');
      var t = s || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
